<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — MegaMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="mm-auth-page">
    <a class="mm-auth-brand" href="index.html">MegaMart</a>

    <div class="card mm-auth-card shadow">
      <div class="card-body">
        <h1 class="mm-auth-title">Sign In</h1>
        <p class="mm-auth-lead mb-0">
          New to Our Product?
          <a href="register.html">Create an Account</a>
        </p>

        <form id="loginForm" class="mt-4" action="#" method="post">
          <div class="mb-3">
            <label class="form-label" for="loginEmail">Email</label>
            <input
              type="email"
              class="form-control"
              id="loginEmail"
              name="email"
              placeholder="Enter Email Address"
              autocomplete="email"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="loginPassword">Password</label>
            <input
              type="password"
              class="form-control"
              id="loginPassword"
              name="password"
              placeholder="Enter Password"
              autocomplete="current-password"
              required
            />
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" value="" id="keepSignedIn" />
            <label class="form-check-label mm-auth-check" for="keepSignedIn">Keep me signed in</label>
          </div>
          <button type="submit" class="btn btn-primary mm-auth-btn-primary">Sign In</button>
        </form>

        <a class="mm-auth-forgot" href="#">Forgot your password?</a>

        <div class="mm-auth-divider"><span>Or sign in using:</span></div>

        <div class="mm-auth-social">
          <button type="button" class="btn btn-outline-secondary">
            <i class="bi bi-google"></i> Continue with Google
          </button>
          <button type="button" class="btn btn-outline-secondary">
            <i class="bi bi-facebook"></i> Continue with Facebook
          </button>
        </div>
      </div>
    </div>

    <p class="mm-auth-back"><a href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to store</a></p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
