<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — MegaMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="mm-auth-page">
    <a class="mm-auth-brand" href="index.html">MegaMart</a>

    <div class="card mm-auth-card shadow">
      <div class="card-body">
        <h1 class="mm-auth-title">Create Account</h1>
        <p class="mm-auth-lead mb-0">
          Already have an account?
          <a href="login.html">Sign In</a>
        </p>

        <form class="mt-4" action="#" method="post" novalidate>
          <div class="mb-3">
            <label class="form-label" for="regName">Full name</label>
            <input
              type="text"
              class="form-control"
              id="regName"
              name="name"
              placeholder="Enter your full name"
              autocomplete="name"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="regEmail">Email</label>
            <input
              type="email"
              class="form-control"
              id="regEmail"
              name="email"
              placeholder="Enter Email Address"
              autocomplete="email"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="regPassword">Password</label>
            <input
              type="password"
              class="form-control"
              id="regPassword"
              name="password"
              placeholder="Create a password"
              autocomplete="new-password"
              required
              minlength="8"
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="regPassword2">Confirm password</label>
            <input
              type="password"
              class="form-control"
              id="regPassword2"
              name="password_confirmation"
              placeholder="Confirm your password"
              autocomplete="new-password"
              required
            />
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" value="" id="termsAgree" required />
            <label class="form-check-label mm-auth-check" for="termsAgree">
              I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn btn-primary mm-auth-btn-primary">Create Account</button>
        </form>

        <div class="mm-auth-divider mt-4"><span>Or sign up using:</span></div>

        <div class="mm-auth-social">
          <button type="button" class="btn btn-outline-secondary">
            <i class="bi bi-google"></i> Continue with Google
          </button>
          <button type="button" class="btn btn-outline-secondary">
            <i class="bi bi-facebook"></i> Continue with Facebook
          </button>
        </div>
      </div>
    </div>

    <p class="mm-auth-back"><a href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to store</a></p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
